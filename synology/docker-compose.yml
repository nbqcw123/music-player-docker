# 🎵 Music Player Docker - 群辉 (Synology) Docker Compose 配置
#
# 安装步骤:
#   1. SSH 登录群辉 NAS
#   2. mkdir -p /volume1/docker/music-player && cd /volume1/docker/music-player
#   3. 将本文件和 main.py 放入该目录
#      (main.py 从 https://github.com/nbqcw123/music-player-docker 下载)
#   4. docker compose up -d
#   5. 访问 http://NAS的IP:8080/player

services:
  music-player:
    build:
      context: .
      dockerfile: Dockerfile
    image: music-player:latest
    container_name: music-player
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - TZ=Asia/Shanghai
    volumes:
      - music_cache:/tmp/music_cache
    restart: unless-stopped

volumes:
  music_cache:
