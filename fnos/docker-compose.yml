# 🎵 Music Player Docker - 飞牛 NAS 安装包
# 版本: v0.1.0-dev
# 说明: 在飞牛 Docker 管理界面中导入此文件即可安装
#
# 安装步骤:
# 1. 登录飞牛 NAS 管理界面
# 2. 进入 Docker → 容器 → 添加 → Docker Compose
# 3. 将以下内容粘贴到编辑器中
# 4. 修改端口映射（如需要）后点击部署
#
# 访问地址: http://NAS的IP:8080/player

version: '3.8'

services:
  music-player:
    image: music-player:dev
    container_name: music-player
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - CACHE_DIR=/tmp/music_cache
      - TZ=Asia/Shanghai
    volumes:
      - music_cache:/tmp/music_cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  music_cache:
