# 🎵 Music Player Docker - 飞牛 NAS Docker Compose 配置
# 版本: v0.1.0-dev
#
# 注意: 此配置需要当前目录包含 Dockerfile 和 main.py
# 安装步骤:
#   1. SSH 登录飞牛 NAS
#   2. mkdir -p /vol1/docker/music-player && cd /vol1/docker/music-player
#   3. 将 Dockerfile 和 main.py 放入该目录
#   4. docker compose up -d
#   5. 访问 http://NAS的IP:8080/player

services:
  music-player:
    build:
      context: .
      dockerfile: Dockerfile
    image: music-player:dev
    container_name: music-player
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - TZ=Asia/Shanghai
    volumes:
      - music_cache:/tmp/music_cache
    restart: unless-stopped

volumes:
  music_cache:
