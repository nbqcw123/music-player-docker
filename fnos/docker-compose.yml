# 🎵 Music Player Docker - 飞牛 NAS 安装包
# 版本: v0.1.0-dev
# 注意: 飞牛 Docker 无法直接拉取 Docker Hub 镜像
# 请先按照 安装说明.md 中的步骤手动构建镜像

services:
  music-player:
    build:
      context: https://github.com/nbqcw123/music-player-docker.git
      dockerfile: Dockerfile
    image: music-player:dev
    container_name: music-player
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - TZ=Asia/Shanghai
    volumes:
      - music_cache:/tmp/music_cache
    restart: unless-stopped

volumes:
  music_cache:
